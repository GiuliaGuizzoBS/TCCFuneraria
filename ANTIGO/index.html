<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Dourado</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Header -->
   <header>
<nav class="navbar navbar-expand-lg">
  <div class="container">

    <!-- Logo -->
    <a class="navbar-brand" href="#">
      <img src="imagens/pombabranca.png" alt="Logo" style="max-height: 60px;">
    </a>

    <!-- Botão Hamburguer -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNavbar" aria-controls="menuNavbar" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Itens do Menu -->
    <div class="collapse navbar-collapse" id="menuNavbar">
      <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link text-dark" href="#inicio">Início</a>
        </li>
        <li class="nav-item">
          <a class="nav-link text-dark" href="#sobre">Serviços</a>
        </li>
        <li class="nav-item">
          <a class="nav-link text-dark" href="#planos">Planos</a>
        </li>
        <li class="nav-item">
          <a class="nav-link text-dark" href="#localizacao">Sobre</a>
        </li>
      </ul>

      <!-- Botão de Contato -->
       <div class="botaocontato">
      <div class="d-flex">
        <a href="tel:000000000" class="btn">Contato: (00) 0000-0000</a>
      </div>
      </div>
    </div>

  </div>
</nav>
   </header>
  
  </div>

                                                                  <!-- Article -->
  <article class="article p-5 text-white">
    <div class="articletitle text-center mb-4">
      <h1 id="inicio">Bem-vindo ao Site</h1>
      <p>Conteúdo principal aqui...</p>
    </div>

    <!-- Carousel -->
    <div id="demo" class="carousel slide" data-bs-ride="carousel">
      <!-- Indicators/dots -->
      <div class="carousel-indicators">
        <button type="button" data-bs-target="#demo" data-bs-slide-to="0" class="active"></button>
        <button type="button" data-bs-target="#demo" data-bs-slide-to="1"></button>
        <button type="button" data-bs-target="#demo" data-bs-slide-to="2"></button>
      </div>

      <!-- Slideshow -->
      <div class="carousel-inner">
        <div class="carousel-item active">
          <img src="imagens/tapaburaco1.jpg" alt="funeraria" class="d-block w-100">
        </div>
        <div class="carousel-item">
          <img src="imagens/tapaburaco2.png" alt="funeraria" class="d-block w-100">
        </div>
        <div class="carousel-item">
          <img src="imagens/tapaburaco3.jpg" alt="funeraria" class="d-block w-100">
        </div>
      </div>

      <!-- Controls -->
      <button class="carousel-control-prev" type="button" data-bs-target="#demo" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
      </button>
      <button class="carousel-control-next" type="button" data-bs-target="#demo" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
      </button>
    </div>
  </article>

  <article class="article p-5 text-white">
    <div class="articletitle text-center mb-4">
      <h1 id="servicos">Nossos Serviços</h1>
      <p>aaaaa</p>
    </div>
    </article>

                                                                           <!-- Footer -->
  <footer class="footer container-fluid bg-warning py-3 mt-5">
    <div class="row text-dark text-center">
      <div class="col-12 col-md-4 footer-left mb-2 mb-md-0">Esquerda</div>
      <div class="col-12 col-md-4 footer-center mb-2 mb-md-0">Centro</div>
      <div class="col-12 col-md-4 footer-right">Direita</div>
    </div>
  </footer>

  <script src="javascript/script.js"></script>
</body>
</html>
